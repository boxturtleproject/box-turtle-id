services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: turtle
      POSTGRES_PASSWORD: turtle
      POSTGRES_DB: boxturtleid
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turtle -d boxturtleid"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
